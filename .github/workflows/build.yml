name: Build Multi-Platform

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach binaries to (e.g. v3.1.0). Leave empty for artifact-only build.'
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: DICOM_PACS_Migrator-Windows.exe
            binary: dist/DICOM_PACS_Migrator.exe
          - os: macos-latest
            artifact: DICOM_PACS_Migrator-macOS
            binary: dist/DICOM_PACS_Migrator
            python-arch: x64       # PyQt5 has no arm64 wheels — use x64 via Rosetta
          - os: ubuntu-22.04
            artifact: DICOM_PACS_Migrator-Linux
            binary: dist/DICOM_PACS_Migrator

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: ${{ matrix.python-arch || 'x64' }}

      # Linux: install Qt runtime dependencies (headless OK for build)
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx libegl1 libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 libxcb-shape0 \
            libxcb-cursor0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm dicom_migrator.spec

      - name: Rename binary
        shell: bash
        run: |
          cp "${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      # Attach to release (only on release trigger or when tag is specified)
      - name: Upload to release
        if: github.event_name == 'release' || github.event.inputs.tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$TAG" "${{ matrix.artifact }}" --clobber
